<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lift Log 家族トレーニングメモ</title>
    <style>
:root {
  --bg: #f6f7f4;
  --surface: #ffffff;
  --surface-2: #eef2ef;
  --ink: #17211d;
  --muted: #68756f;
  --line: #dbe1dc;
  --accent: #16735f;
  --accent-2: #d94f30;
  --accent-3: #2f6fb4;
  --shadow: 0 18px 45px rgba(24, 38, 32, 0.1);
}

body[data-theme="dark"] {
  --bg: #111815;
  --surface: #1b2521;
  --surface-2: #26332e;
  --ink: #edf6f1;
  --muted: #a7b8af;
  --line: #33423c;
  --shadow: 0 18px 45px rgba(0, 0, 0, 0.24);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  background: var(--bg);
  font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
  letter-spacing: 0;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  display: grid;
  grid-template-columns: 300px minmax(0, 1fr);
  min-height: 100vh;
}

.sidebar {
  display: flex;
  flex-direction: column;
  gap: 18px;
  padding: 24px;
  background: #17211d;
  color: #f7fbf8;
}

body[data-theme="dark"] .sidebar {
  background: #0c1210;
}

.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 48px;
  height: 48px;
  border-radius: 8px;
  background: #35a37c;
  color: #ffffff;
  font-weight: 800;
}

.brand h1,
.brand p,
.section-head h2,
.section-head h3,
.panel h3 {
  margin: 0;
}
