<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>えいごワード モンスター</title>
  <style>
    :root {
      --bg1: #fff7d6;
      --bg2: #dff7ff;
      --main: #ff8fb3;
      --sub: #7bdff2;
      --accent: #ffd166;
      --text: #333;
      --card: #ffffff;
      --good: #4caf50;
      --bad: #ff6b6b;
      --shadow: 0 10px 25px rgba(0,0,0,0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      padding: 16px;
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 10px 0 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 7vw, 46px);
      color: #ff6fa3;
      text-shadow: 2px 2px 0 #fff;
    }

    .subtitle {
      margin-top: 6px;
      font-weight: 700;
      color: #4a90a4;
    }

    .card {
      background: rgba(255,255,255,0.92);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 16px;
      border: 4px solid rgba(255,255,255,0.7);
    }

    .top-row,
    .status-row,
    .button-row,
    .hint-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }

    .level-btn,
    button {
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 5px 0 rgba(0,0,0,0.15);
      transition: transform .08s, box-shadow .08s, opacity .2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    button:active,
    .level-btn:active {
      transform: translateY(4px);
      box-shadow: 0 1px 0 rgba(0,0,0,0.15);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .level-btn {
      background: #fff;
      color: #4a90a4;
      border: 3px solid #b8effa;
    }

    .level-btn.active {
      background: #7bdff2;
      color: #fff;
      border-color: #7bdff2;
    }

    .primary { background: var(--main); color: #fff; }
    .secondary { background: var(--sub); color: #fff; }
    .yellow { background: var(--accent); color: #6b4b00; }
    .danger { background: #ff8b8b; color: #fff; }
    .small-btn { font-size: 14px; padding: 10px 13px; }

    .status-row {
      justify-content: space-around;
      margin-top: 12px;
      font-weight: 900;
    }

    .badge {
      background: #fff7cc;
      border: 3px solid #ffe37a;
      border-radius: 18px;
      padding: 8px 12px;
      min-width: 110px;
      text-align: center;
    }

    .question-area {
      text-align: center;
    }

    .emoji {
      font-size: clamp(78px, 24vw, 140px);
      line-height: 1;
      margin: 8px 0;
      animation: float 2s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .jp-name {
      font-size: 24px;
      font-weight: 900;
      color: #555;
      margin-bottom: 6px;
    }

    .hint-box {
      min-height: 42px;
      background: #f3fbff;
      border: 3px dashed #9de7f5;
      border-radius: 20px;
      padding: 10px;
      font-weight: 900;
      color: #3d8da0;
      margin: 10px 0;
    }

    .answer-slots,
    .letter-bank {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin: 14px 0;
      min-height: 62px;
    }

    .slot,
    .letter {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 27px;
      font-weight: 900;
    }

    .slot {
      background: #fff;
      border: 3px dashed #ffb3cc;
      color: #ff6fa3;
    }

    .letter {
      background: #fff;
      border: 3px solid #ffd166;
      color: #333;
      box-shadow: 0 5px 0 #e5b84d;
      cursor: pointer;
      text-transform: uppercase;
      padding: 0;
      font-family: inherit;
      transition: opacity .2s, transform .2s;
    }

    .letter:hover:not(:disabled) {
      transform: scale(1.05);
    }

    .letter:disabled {
      opacity: 0.25;
      pointer-events: none;
      transform: scale(0.92);
    }

    .message {
      min-height: 32px;
      text-align: center;
      font-size: 20px;
      font-weight: 900;
      margin-top: 8px;
    }

    .message.good { color: var(--good); }
    .message.bad { color: var(--bad); }

    .stamp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 12px;
    }

    .stamp {
      background: #fff;
      border-radius: 22px;
      padding: 12px 8px;
      text-align: center;
      border: 3px solid #eee;
      min-height: 118px;
    }

    .stamp.locked {
      filter: grayscale(1);
      opacity: .45;
    }

    .stamp-emoji {
      font-size: 44px;
      line-height: 1.1;
    }

    .stamp-name {
      margin-top: 5px;
      font-size: 14px;
      font-weight: 900;
    }

    .stamp-type {
      font-size: 12px;
      color: #777;
      font-weight: 700;
    }

    .reward-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 10;
    }

    .reward-modal.show { display: flex; }

    .reward-card {
      max-width: 360px;
      width: 100%;
      background: #fff;
      border-radius: 32px;
      text-align: center;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,.25);
      animation: pop .35s ease-out;
    }

    @keyframes pop {
      from { transform: scale(.75); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    .reward-emoji {
      font-size: 96px;
      margin: 8px 0;
    }

    .confetti {
      position: fixed;
      top: -20px;
      width: 12px;
      height: 18px;
      border-radius: 3px;
      animation: fall 1.8s linear forwards;
      z-index: 20;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    .section-title {
      text-align: center;
      margin-top: 0;
      color: #ff6fa3;
    }

    .section-subtitle {
      text-align: center;
      font-weight: 800;
    }

    details summary {
      cursor: pointer;
      font-weight: 900;
      color: #4a90a4;
      padding: 8px;
    }

    .word-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
      margin-top: 10px;
      font-weight: 700;
    }

    .word-item {
      background: #f7fdff;
      border-radius: 12px;
      padding: 8px;
      border: 2px solid #d7f5fb;
    }

    @media (max-width: 420px) {
      .slot, .letter {
        width: 46px;
        height: 46px;
        font-size: 23px;
      }
      .card { padding: 14px; border-radius: 24px; }
      button, .level-btn { font-size: 14px; padding: 10px 12px; }
      .badge { min-width: 92px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>えいごワード モンスター</h1>
      <div class="subtitle">ならべかえて英単語を完成させよう！</div>
    </header>

    <section class="card">
      <div class="top-row" id="levelButtons"></div>
      <div class="status-row">
        <div class="badge">れんぞく<br><span id="streak">0</span>問</div>
        <div class="badge">10問まで<br><span id="clearCount">0</span>/10</div>
        <div class="badge">スタンプ<br><span id="stampCount">0</span>こ</div>
      </div>
    </section>

    <section class="card question-area">
      <div class="emoji" id="emoji">🐶</div>
      <div class="jp-name" id="jpName">いぬ</div>
      <div class="hint-box" id="hintBox">ヒントボタンをおすと、少しだけ教えてくれるよ</div>

      <div class="answer-slots" id="answerSlots"></div>
      <div class="letter-bank" id="letterBank"></div>

      <div class="hint-row">
        <button class="yellow small-btn" id="hintFirstBtn" aria-label="1文字ヒント">1文字ヒント</button>
        <button class="yellow small-btn" id="hintLengthBtn" aria-label="文字数ヒント">文字数ヒント</button>
        <button class="secondary small-btn" id="soundBtn" aria-label="発音">発音</button>
      </div>

      <div class="button-row" style="margin-top:12px;">
        <button class="secondary" id="undoBtn" aria-label="1つもどす">1つもどす</button>
        <button class="danger" id="resetBtn" aria-label="やりなおし">やりなおし</button>
        <button class="primary" id="nextBtn" aria-label="つぎの問題" disabled>つぎの問題</button>
      </div>

      <div class="message" id="message"></div>
    </section>

    <section class="card">
      <h2 class="section-title">ごほうびスタンプ図鑑</h2>
      <p class="section-subtitle">10問クリアで、かわいいオリジナルキャラをGET！</p>
      <div class="stamp-grid" id="stampGrid"></div>
    </section>

    <section class="card">
      <details>
        <summary>レベル別の単語を見る</summary>
        <div id="wordList"></div>
      </details>
    </section>
  </div>

  <div class="reward-modal" id="rewardModal">
    <div class="reward-card">
      <h2 class="section-title" style="margin:0;">スタンプGET！</h2>
      <div class="reward-emoji" id="rewardEmoji">🐶🔥</div>
      <h3 id="rewardName">ほのおワン</h3>
      <p id="rewardType">どうぶつモンスター</p>
      <button class="primary" id="closeRewardBtn" aria-label="やったー">やったー！</button>
    </div>
  </div>

  <script>
    "use strict";

    const WORDS = {
      level1: {
        label: "Lv1 かんたん",
        words: [
          { word: "dog", jp: "いぬ", emoji: "🐶" },
          { word: "cat", jp: "ねこ", emoji: "🐱" },
          { word: "sun", jp: "たいよう", emoji: "☀️" },
          { word: "bus", jp: "バス", emoji: "🚌" },
          { word: "egg", jp: "たまご", emoji: "���" },
          { word: "pen", jp: "ペン", emoji: "🖊️" },
          { word: "fox", jp: "きつね", emoji: "🦊" },
          { word: "pig", jp: "ぶた", emoji: "🐷" },
          { word: "cow", jp: "うし", emoji: "🐮" },
          { word: "car", jp: "くるま", emoji: "🚗" }
        ]
      },
      level2: {
        label: "Lv2 きほん",
        words: [
          { word: "apple", jp: "りんご", emoji: "🍎" },
          { word: "tiger", jp: "トラ", emoji: "🐯" },
          { word: "train", jp: "でんしゃ", emoji: "🚃" },
          { word: "milk", jp: "ミルク", emoji: "🥛" },
          { word: "happy", jp: "うれしい", emoji: "😊" },
          { word: "water", jp: "みず", emoji: "💧" },
          { word: "green", jp: "みどり", emoji: "🟢" },
          { word: "house", jp: "いえ", emoji: "🏠" },
          { word: "bread", jp: "パン", emoji: "🍞" },
          { word: "chair", jp: "いす", emoji: "🪑" }
        ]
      },
      level3: {
        label: "Lv3 チャレンジ",
        words: [
          { word: "elephant", jp: "ぞう", emoji: "🐘" },
          { word: "library", jp: "としょかん", emoji: "📚" },
          { word: "soccer", jp: "サッカー", emoji: "⚽" },
          { word: "beautiful", jp: "うつくしい", emoji: "🌸" },
          { word: "teacher", jp: "先生", emoji: "👩‍🏫" },
          { word: "morning", jp: "あさ", emoji: "🌅" },
          { word: "kitchen", jp: "キッチン", emoji: "🍳" },
          { word: "holiday", jp: "休日", emoji: "🎈" },
          { word: "penguin", jp: "ペンギン", emoji: "🐧" },
          { word: "monster", jp: "モンスター", emoji: "👾" }
        ]
      },
      level4: {
        label: "Lv4 すごい",
        words: [
          { word: "mountain", jp: "山", emoji: "⛰️" },
          { word: "adventure", jp: "ぼうけん", emoji: "🗺️" },
          { word: "science", jp: "かがく", emoji: "🔬" },
          { word: "rainbow", jp: "にじ", emoji: "🌈" },
          { word: "vegetable", jp: "やさい", emoji: "🥦" },
          { word: "dinosaur", jp: "きょうりゅう", emoji: "🦖" },
          { word: "computer", jp: "コンピューター", emoji: "💻" },
          { word: "birthday", jp: "たんじょうび", emoji: "🎂" },
          { word: "friendly", jp: "やさしい", emoji: "🤝" },
          { word: "treasure", jp: "たからもの", emoji: "💎" }
        ]
      }
    };

    const STAMPS = [
      { id: "fireDog", name: "ほのおワン", type: "げんきタイプ", emoji: "🐶🔥" },
      { id: "sparkCat", name: "ピカにゃん", type: "でんきタイプ", emoji: "🐱⚡" },
      { id: "icePenguin", name: "こおりペン", type: "こおりタイプ", emoji: "🐧❄️" },
      { id: "leafFox", name: "はっぱコン", type: "もりタイプ", emoji: "🦊🍃" },
      { id: "starBear", name: "きらくま", type: "ほしタイプ", emoji: "🐻⭐" },
      { id: "rainbowRabbit", name: "にじぴょん", type: "にじタイプ", emoji: "🐰🌈" },
      { id: "waterDolphin", name: "ぷかイル", type: "みずタイプ", emoji: "🐬💧" },
      { id: "moonOwl", name: "つきフクロウ", type: "よるタイプ", emoji: "🦉🌙" }
    ];

    const STORAGE_KEY = "englishWordMonsterSave_v1";
    const SAVE_DEBOUNCE_MS = 500;

    let state = {
      level: "level1",
      current: null,
      letters: [],
      answer: [],
      usedIndexes: [],
      streak: 0,
      clearCount: 0,
      collectedStamps: [],
      solvedWords: {},
      hintCount: 0,
      isAnswered: false
    };

    let saveTimeout = null;
    let isSpeaking = false;

    const el = {
      levelButtons: document.getElementById("levelButtons"),
      streak: document.getElementById("streak"),
      clearCount: document.getElementById("clearCount"),
      stampCount: document.getElementById("stampCount"),
      emoji: document.getElementById("emoji"),
      jpName: document.getElementById("jpName"),
      hintBox: document.getElementById("hintBox"),
      answerSlots: document.getElementById("answerSlots"),
      letterBank: document.getElementById("letterBank"),
      message: document.getElementById("message"),
      stampGrid: document.getElementById("stampGrid"),
      rewardModal: document.getElementById("rewardModal"),
      rewardEmoji: document.getElementById("rewardEmoji"),
      rewardName: document.getElementById("rewardName"),
      rewardType: document.getElementById("rewardType"),
      wordList: document.getElementById("wordList"),
      hintFirstBtn: document.getElementById("hintFirstBtn"),
      hintLengthBtn: document.getElementById("hintLengthBtn"),
      soundBtn: document.getElementById("soundBtn"),
      undoBtn: document.getElementById("undoBtn"),
      resetBtn: document.getElementById("resetBtn"),
      nextBtn: document.getElementById("nextBtn"),
      closeRewardBtn: document.getElementById("closeRewardBtn")
    };

    function loadSave() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!saved) return;
        state.level = saved.level || state.level;
        state.streak = Number(saved.streak || 0);
        state.clearCount = Number(saved.clearCount || 0);
        state.collectedStamps = Array.isArray(saved.collectedStamps) ? saved.collectedStamps : [];
        state.solvedWords = saved.solvedWords && typeof saved.solvedWords === "object" ? saved.solvedWords : {};
      } catch (e) {
        console.warn("Save data could not be loaded.", e);
      }
    }

    function saveData() {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        const data = {
          level: state.level,
          streak: state.streak,
          clearCount: state.clearCount,
          collectedStamps: state.collectedStamps,
          solvedWords: state.solvedWords
        };
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        } catch (e) {
          console.warn("Failed to save data.", e);
        }
      }, SAVE_DEBOUNCE_MS);
    }

    function shuffle(array) {
      const copy = array.slice();
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function speak(text) {
      if (isSpeaking) return;
      if (!("speechSynthesis" in window)) {
        showMessage("このブラウザでは発音が使えないかも", "bad");
        return;
      }
      isSpeaking = true;
      window.speechSynthesis.cancel();
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = "en-US";
      utter.rate = 0.75;
      utter.pitch = 1.2;
      utter.onend = () => { isSpeaking = false; };
      utter.onerror = () => { isSpeaking = false; };
      window.speechSynthesis.speak(utter);
    }

    function buildLevelButtons() {
      el.levelButtons.innerHTML = "";
      Object.keys(WORDS).forEach(levelKey => {
        const btn = document.createElement("button");
        btn.className = "level-btn" + (state.level === levelKey ? " active" : "");
        btn.textContent = WORDS[levelKey].label;
        btn.setAttribute("aria-label", WORDS[levelKey].label);
        btn.addEventListener("click", () => {
          state.level = levelKey;
          saveData();
          newQuestion();
          buildLevelButtons();
        });
        el.levelButtons.appendChild(btn);
      });
    }

    function chooseWord() {
      const list = WORDS[state.level].words;
      if (!list || list.length === 0) return null;
      return list[Math.floor(Math.random() * list.length)];
    }

    function newQuestion() {
      const wordObj = chooseWord();
      if (!wordObj) return;
      const letters = shuffle(wordObj.word.toLowerCase().split(""));
      state.current = wordObj;
      state.letters = letters;
      state.answer = [];
      state.usedIndexes = [];
      state.hintCount = 0;
      state.isAnswered = false;
      el.hintBox.textContent = "ヒントボタンをおすと、少しだけ教えてくれるよ";
      showMessage("", "");
      el.nextBtn.disabled = true;
      renderAll();
    }

    function renderAll() {
      renderQuestion();
      renderSlots();
      renderLetters();
      renderStatus();
      renderStamps();
    }

    function renderQuestion() {
      el.emoji.textContent = state.current ? state.current.emoji : "🐶";
      el.jpName.textContent = state.current ? state.current.jp : "いぬ";
    }

    function renderSlots() {
      el.answerSlots.innerHTML = "";
      if (!state.current) return;
      const length = state.current.word.length;
      for (let i = 0; i < length; i++) {
        const slot = document.createElement("div");
        slot.className = "slot";
        slot.textContent = state.answer[i] ? state.answer[i].toUpperCase() : "";
        el.answerSlots.appendChild(slot);
      }
    }

    function renderLetters() {
      el.letterBank.innerHTML = "";
      state.letters.forEach((letter, index) => {
        const btn = document.createElement("button");
        btn.className = "letter";
        btn.textContent = letter;
        btn.disabled = state.usedIndexes.includes(index);
        btn.setAttribute("aria-label", letter);
        btn.addEventListener("click", () => chooseLetter(index));
        el.letterBank.appendChild(btn);
      });
    }

    function renderStatus() {
      el.streak.textContent = state.streak;
      el.clearCount.textContent = state.clearCount;
      el.stampCount.textContent = state.collectedStamps.length;
    }

    function renderStamps() {
      el.stampGrid.innerHTML = "";
      STAMPS.forEach(stamp => {
        const hasStamp = state.collectedStamps.includes(stamp.id);
        const div = document.createElement("div");
        div.className = "stamp" + (hasStamp ? "" : " locked");
        div.innerHTML = `
          <div class="stamp-emoji">${hasStamp ? stamp.emoji : "❔"}</div>
          <div class="stamp-name">${hasStamp ? stamp.name : "？？？"}</div>
          <div class="stamp-type">${hasStamp ? stamp.type : "10問クリアでGET"}</div>
        `;
        el.stampGrid.appendChild(div);
      });
    }

    function chooseLetter(index) {
      if (state.isAnswered) return;
      if (state.usedIndexes.includes(index)) return;
      if (state.answer.length >= state.current.word.length) return;

      state.usedIndexes.push(index);
      state.answer.push(state.letters[index]);
      renderSlots();
      renderLetters();

      if (state.answer.length === state.current.word.length) {
        checkAnswer();
      }
    }

    function checkAnswer() {
      if (!state.current) return;
      const answerText = state.answer.join("").toLowerCase();
      const correctText = state.current.word.toLowerCase();

      if (answerText === correctText) {
        state.isAnswered = true;
        state.streak += 1;
        state.clearCount += 1;
        state.solvedWords[correctText] = true;
        showMessage(getStarMessage(), "good");
        speak(correctText);
        makeConfetti();
        el.nextBtn.disabled = false;

        if (state.clearCount >= 10) {
          state.clearCount = 0;
          giveReward();
        }
        saveData();
        renderAll();
      } else {
        state.streak = 0;
        showMessage("もう一度チャレンジしてみよう！", "bad");
        saveData();
      }
    }

    function showMessage(text, type) {
      el.message.textContent = text;
      el.message.className = type ? "message " + type : "message";
    }

    function getStarMessage() {
      const messages = [
        "すばらしい！🌟",
        "グレート！⭐",
        "ナイス！✨",
        "パーフェクト！💯",
        "イエーイ！🎉"
      ];
      return messages[Math.floor(Math.random() * messages.length)];
    }

    function makeConfetti() {
      for (let i = 0; i < 20; i++) {
        setTimeout(() => {
          const confetti = document.createElement("div");
          confetti.className = "confetti";
          confetti.style.left = Math.random() * 100 + "%";
          confetti.style.backgroundColor = ["#ff8fb3", "#7bdff2", "#ffd166", "#4caf50"][Math.floor(Math.random() * 4)];
          document.body.appendChild(confetti);
          setTimeout(() => confetti.remove(), 1800);
        }, i * 30);
      }
    }

    function giveReward() {
      const unlockedStamps = STAMPS.filter(s => !state.collectedStamps.includes(s.id));
      if (unlockedStamps.length === 0) {
        showMessage("全部のスタンプをGETしました！おめでとう！", "good");
        return;
      }
      const stamp = unlockedStamps[Math.floor(Math.random() * unlockedStamps.length)];
      state.collectedStamps.push(stamp.id);
      el.rewardEmoji.textContent = stamp.emoji;
      el.rewardName.textContent = stamp.name;
      el.rewardType.textContent = stamp.type;
      el.rewardModal.classList.add("show");
      saveData();
    }

    function undo() {
      if (state.isAnswered || state.answer.length === 0) return;
      state.usedIndexes.pop();
      state.answer.pop();
      renderSlots();
      renderLetters();
      showMessage("", "");
    }

    function reset() {
      state.answer = [];
      state.usedIndexes = [];
      state.hintCount = 0;
      state.isAnswered = false;
      el.hintBox.textContent = "ヒントボタンをおすと、少しだけ教えてくれるよ";
      showMessage("", "");
      renderSlots();
      renderLetters();
    }

    function showHintFirst() {
      if (!state.current || state.isAnswered) return;
      state.hintCount += 1;
      const word = state.current.word;
      el.hintBox.textContent = `最初の文字は「${word[0].toUpperCase()}」です`;
    }

    function showHintLength() {
      if (!state.current || state.isAnswered) return;
      state.hintCount += 1;
      const word = state.current.word;
      el.hintBox.textContent = `全部で${word.length}文字です`;
    }

    function closeRewardModal() {
      el.rewardModal.classList.remove("show");
      newQuestion();
    }

    // Event Listeners
    el.hintFirstBtn.addEventListener("click", showHintFirst);
    el.hintLengthBtn.addEventListener("click", showHintLength);
    el.soundBtn.addEventListener("click", () => {
      if (state.current) speak(state.current.word);
    });
    el.undoBtn.addEventListener("click", undo);
    el.resetBtn.addEventListener("click", reset);
    el.nextBtn.addEventListener("click", newQuestion);
    el.closeRewardBtn.addEventListener("click", closeRewardModal);

    // Close modal on backdrop click
    el.rewardModal.addEventListener("click", (e) => {
      if (e.target === el.rewardModal) {
        closeRewardModal();
      }
    });

    // Initialize
    loadSave();
    buildLevelButtons();
    newQuestion();
  </script>
</body>
</html>
